name: Build NóminaApp APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Descargar gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - name: Regenerar archivos criticos
        run: |
          python3 - << 'EOF'
          import os

          files = {}

          files["app/src/main/AndroidManifest.xml"] = """<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET"/>
    <application
        android:allowBackup="true"
        android:hardwareAccelerated="true"
        android:icon="@mipmap/ic_launcher"
        android:label="@string/app_name"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:theme="@style/AppTheme"
        android:usesCleartextTraffic="true">
        <activity
            android:name=".MainActivity"
            android:configChanges="orientation|screenSize"
            android:exported="true"
            android:screenOrientation="portrait"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
    </application>
</manifest>"""

          files["app/src/main/res/values/styles.xml"] = """<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="android:Theme.DeviceDefault.NoActionBar">
    </style>
</resources>"""

          files["app/src/main/res/values/strings.xml"] = """<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">NominaApp</string>
</resources>"""

          files["app/src/main/res/values/colors.xml"] = """<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="bg_dark">#FF0D0F14</color>
</resources>"""

          for path, content in files.items():
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"OK: {path}")
          EOF

      - name: Dar permisos gradlew
        run: chmod +x ./gradlew

      - name: Compilar APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: NominaApp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
