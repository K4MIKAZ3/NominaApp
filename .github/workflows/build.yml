name: Build NóminaApp APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # permite correr manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Dar permisos a Gradle wrapper
        run: chmod +x ./gradlew

      - name: 🏗️ Compilar APK debug
        run: ./gradlew assembleDebug --stacktrace

      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: NominaApp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🏗️ Compilar APK release (sin firmar)
        run: ./gradlew assembleRelease --stacktrace

      - name: 📦 Subir APK release como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: NominaApp-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
